
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Fireburn NOR 2026</title>
<style>
body{background:#0d1117;color:#e6edf3;font-family:sans-serif}
#map{height:600px;border-radius:10px}
</style>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>

<h2>🔥 Fireburn NOR 2026</h2>
<select id="prov"></select>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
let map = L.map('map').setView([17,100],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

async function load(){
  let r = await fetch('/api/fireburn-2026');
  let d = await r.json();
  let provSel = document.getElementById('prov');

  let provs = [...new Set(d.detail_rows.map(x=>x.province))];
  provSel.innerHTML = '<option value="">ALL</option>'+provs.map(p=>`<option>${p}</option>`);

  function render(){
    map.eachLayer(l=>{ if(l instanceof L.Marker) map.removeLayer(l)});
    let f = provSel.value;
    d.points.filter(p=>!f || p.province==f).forEach(p=>{
      L.marker([p.latitude,p.longitude]).addTo(map)
        .bindPopup(p.ticket_id);
    });
  }

  provSel.onchange=render;
  render();
}
load();
</script>

</body>
</html>
